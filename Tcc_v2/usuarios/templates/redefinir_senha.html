<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Redefinir Senha - App Saúde Mental</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 40px 30px;
        max-width: 450px;
        width: 100%;
      }
      .logo {
        text-align: center;
        font-size: 60px;
        margin-bottom: 20px;
      }
      h1 {
        color: #2c3e50;
        text-align: center;
        margin-bottom: 10px;
        font-size: 24px;
      }
      .subtitle {
        text-align: center;
        color: #7f8c8d;
        margin-bottom: 30px;
        font-size: 14px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        color: #2c3e50;
        font-weight: 500;
        font-size: 14px;
      }
      input {
        width: 100%;
        padding: 14px;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-size: 16px;
        transition: all 0.3s;
      }
      input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }
      button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s;
      }
      button:hover {
        transform: translateY(-2px);
      }
      .message {
        margin-top: 20px;
        padding: 12px;
        border-radius: 10px;
        text-align: center;
        display: none;
        font-size: 14px;
      }
      .success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      .loading {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid #fff;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 0.6s linear infinite;
        margin-right: 8px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .footer {
        text-align: center;
        margin-top: 25px;
        font-size: 12px;
        color: #999;
      }
      .footer a {
        color: #667eea;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">🔐</div>
      <h1>Redefinir Senha</h1>
      <div class="subtitle">Digite sua nova senha</div>

      <div class="form-group">
        <label>Nova Senha</label>
        <input
          type="password"
          id="nova_senha"
          placeholder="Digite sua nova senha"
        />
      </div>

      <div class="form-group">
        <label>Confirmar Senha</label>
        <input
          type="password"
          id="confirmar_senha"
          placeholder="Confirme sua nova senha"
        />
      </div>

      <button id="btn_redefinir" onclick="redefinirSenha()">
        Redefinir Senha
      </button>

      <div id="message" class="message"></div>
      <div class="footer">
        <a href="#" onclick="voltarLogin()">Voltar para o login</a>
      </div>
    </div>

    <script>
      // Pega o token da URL
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("token");

      async function redefinirSenha() {
        const novaSenha = document.getElementById("nova_senha").value;
        const confirmarSenha = document.getElementById("confirmar_senha").value;
        const msgDiv = document.getElementById("message");
        const btn = document.getElementById("btn_redefinir");

        // Validações
        if (!novaSenha || !confirmarSenha) {
          mostrarMensagem("Preencha todos os campos", "error");
          return;
        }

        if (novaSenha !== confirmarSenha) {
          mostrarMensagem("As senhas não coincidem", "error");
          return;
        }

        if (novaSenha.length < 6) {
          mostrarMensagem("A senha deve ter pelo menos 6 caracteres", "error");
          return;
        }

        // Mostrar loading
        btn.innerHTML = '<span class="loading"></span> Redefinindo...';
        btn.disabled = true;

        try {
          const response = await fetch(
            "/api/usuarios/reset-password/confirmar/",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                token: token,
                new_password: novaSenha,
              }),
            },
          );

          const data = await response.json();

          if (response.ok) {
            mostrarMensagem("✅ Senha redefinida com sucesso!", "success");
            setTimeout(() => {
              window.location.href = "/";
            }, 2000);
          } else {
            mostrarMensagem(data.erro || "Erro ao redefinir senha", "error");
            btn.innerHTML = "Redefinir Senha";
            btn.disabled = false;
          }
        } catch (error) {
          mostrarMensagem("Erro de conexão com o servidor", "error");
          btn.innerHTML = "Redefinir Senha";
          btn.disabled = false;
        }
      }

      function mostrarMensagem(texto, tipo) {
        const msgDiv = document.getElementById("message");
        msgDiv.textContent = texto;
        msgDiv.className = `message ${tipo}`;
        msgDiv.style.display = "block";

        setTimeout(() => {
          msgDiv.style.display = "none";
        }, 5000);
      }

      function voltarLogin() {
        window.location.href = "/";
      }

      // Verificar se tem token
      if (!token) {
        mostrarMensagem("Token inválido ou expirado", "error");
        document.getElementById("nova_senha").disabled = true;
        document.getElementById("confirmar_senha").disabled = true;
        document.getElementById("btn_redefinir").disabled = true;
      }
    </script>
  </body>
</html>
